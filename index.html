<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT_LCD_Display_EC11_Board</title>

  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f9;
      --panel: #ffffff;
      --text: #1d2a35;
      --muted: #5d6b79;
      --primary: #1e73d8;
      --primary-soft: #e8f1fd;
      --border: #d9e4f0;
      --shadow: 0 12px 32px rgba(25, 58, 99, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: 100%;
      max-width: 840px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3vw, 2rem);
      color: var(--text);
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 1rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    li a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    li a::after {
      content: "↗";
      font-size: 0.95rem;
      opacity: 0.65;
    }

    li a:hover {
      background: var(--primary-soft);
      border-color: #bdd6f5;
      transform: translateY(-1px);
    }
  </style>

</head>
